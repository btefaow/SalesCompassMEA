<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cute Pomodoro Timer</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Nunito', 'sans-serif'] },
          colors: {
            'cute-bg': '#2b2d42',
            'cute-panel': '#3f3d56',
            'cute-primary': '#a2d2ff',
            'cute-secondary': '#ffafcc',
            'cute-accent': '#bde0fe',
          },
        }
      }
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    .animate-pulse-slow {
      animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .7; }
    }
  </style>

  <!-- React CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel CDN for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-cute-bg text-white font-sans antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function PlayIcon({ className }) {
      return <svg className={className} xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
    }
    function PauseIcon() {
      return <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>;
    }
    function ResetIcon() {
      return <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>;
    }

    const FOCUS_TIME = 25 * 60;
    const BREAK_TIME = 5 * 60;

    function App() {
      const [timeLeft, setTimeLeft] = useState(FOCUS_TIME);
      const [isRunning, setIsRunning] = useState(false);
      const [mode, setMode] = useState('focus'); 

      useEffect(() => {
        let timer;
        if (isRunning && timeLeft > 0) {
          timer = setInterval(() => {
            setTimeLeft((prev) => prev - 1);
          }, 1000);
        } else if (isRunning && timeLeft === 0) {
          const newMode = mode === 'focus' ? 'break' : 'focus';
          setMode(newMode);
          setTimeLeft(newMode === 'focus' ? FOCUS_TIME : BREAK_TIME);
          setIsRunning(false); 
        }
        return () => clearInterval(timer);
      }, [isRunning, timeLeft, mode]);

      const toggleTimer = () => setIsRunning(!isRunning);

      const resetTimer = () => {
        setIsRunning(false);
        setTimeLeft(mode === 'focus' ? FOCUS_TIME : BREAK_TIME);
      };

      const switchMode = (newMode) => {
        setIsRunning(false);
        setMode(newMode);
        setTimeLeft(newMode === 'focus' ? FOCUS_TIME : BREAK_TIME);
      };

      const formatTime = (seconds) => {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
      };

      const isFocus = mode === 'focus';

      return (
        <div className="min-h-screen flex items-center justify-center p-4 selection:bg-cute-secondary selection:text-cute-bg transition-colors duration-500">
          <div className={`w-full max-w-md bg-cute-panel rounded-3xl shadow-2xl p-8 relative overflow-hidden transition-all duration-500 ${isFocus ? 'shadow-cute-primary/20' : 'shadow-cute-secondary/20'}`}>
            
            <div className={`absolute top-0 left-0 w-full h-2 ${isFocus ? 'bg-cute-primary' : 'bg-cute-secondary'} transition-colors duration-500`}></div>
            <div className="absolute -top-16 -right-16 w-32 h-32 bg-white/5 rounded-full blur-2xl"></div>
            <div className="absolute -bottom-16 -left-16 w-32 h-32 bg-white/5 rounded-full blur-2xl"></div>

            <div className="flex justify-center space-x-4 mb-8 relative z-10">
              <button
                onClick={() => switchMode('focus')}
                className={`flex items-center space-x-2 px-4 py-2 rounded-full font-bold transition-all duration-300 ${
                  isFocus ? 'bg-cute-primary text-cute-bg shadow-lg scale-105' : 'text-white/50 hover:bg-white/5 hover:text-white'
                }`}
              >
                <span className="text-xl">🍅</span>
                <span>Focus</span>
              </button>
              <button
                onClick={() => switchMode('break')}
                className={`flex items-center space-x-2 px-4 py-2 rounded-full font-bold transition-all duration-300 ${
                  !isFocus ? 'bg-cute-secondary text-cute-bg shadow-lg scale-105' : 'text-white/50 hover:bg-white/5 hover:text-white'
                }`}
              >
                <span className="text-xl">☕</span>
                <span>Break</span>
              </button>
            </div>

            <div className="text-center mb-10 relative z-10">
              <div className="relative inline-block">
                <div className={`text-8xl font-extrabold tracking-tight tabular-nums transition-all duration-500 ${isFocus ? 'text-cute-primary' : 'text-cute-secondary'} ${isRunning ? 'animate-pulse-slow' : ''}`}>
                  {formatTime(timeLeft)}
                </div>
              </div>
              <p className="mt-4 text-white/60 font-medium text-lg tracking-wide">
                {isFocus ? "Time to stay focused! 🍅" : "Take a deep breath! ☕"}
              </p>
            </div>

            <div className="flex justify-center items-center space-x-6 relative z-10">
              <button
                onClick={toggleTimer}
                className={`w-20 h-20 rounded-2xl flex justify-center items-center shadow-xl transition-all duration-300 hover:scale-105 active:scale-95 ${
                  isFocus ? 'bg-cute-primary text-cute-bg hover:bg-cute-accent' : 'bg-cute-secondary text-cute-bg hover:opacity-90'
                }`}
              >
                {isRunning ? <PauseIcon /> : <PlayIcon className="ml-2" />}
              </button>

              <button
                onClick={resetTimer}
                className="w-14 h-14 rounded-2xl bg-white/5 text-white/70 flex justify-center items-center hover:bg-white/10 hover:text-white transition-all duration-300 active:scale-95 shadow-lg"
              >
                <ResetIcon />
              </button>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
